<div class="balance-root">
  <!-- Main Balance Cards -->
  <div class="bal-cards">
    <div class="bal-card group" *ngFor="let item of balanceData; trackBy: trackIndex">
      <div class="aura"></div>
      <div class="shimmer bal-shimmer"></div>
      <div class="bal-head">
        <div class="icon-box">
          <!-- Placeholder icon dot; replace with lucide-angular later -->
          <span [ngClass]="'icon-' + item.icon" class="bal-icon">●</span>
        </div>
        <div class="bal-info">
          <div class="bal-label">{{ item.label }}</div>
          <div class="bal-value">{{ item.value }}</div>
        </div>
        <div *ngIf="item.change" class="bal-change" [ngClass]="item.positive ? 'pos' : 'neg'">
          <span>{{ item.change }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- P/L Cards -->
  <div class="bal-pl-grid">
    <div class="bal-pl-card group" *ngFor="let p of pnlData; trackBy: trackIndex" [ngClass]="p.positive ? 'pos' : 'neg'">
      <div class="shimmer bal-shimmer"></div>
      <div class="bal-pl-label">{{ p.label }}</div>
      <div class="bal-pl-value" [ngClass]="p.positive ? 'pos' : 'neg'">{{ p.value }}</div>
      <div class="bal-pl-change" [ngClass]="p.positive ? 'pos' : 'neg'">
        <span>{{ p.change }}</span>
      </div>
    </div>
  </div>

  <!-- Recent Transactions -->
  <div class="bal-trans">
    <h2>Recent Transactions</h2>
    <div class="bal-trans-list">
      <div class="bal-trans-card group" *ngFor="let tx of recentTransactions; trackBy: trackIndex">
        <div class="shine"></div>
        <div class="shimmer bal-shimmer"></div>
        <div class="bal-trans-main">
          <div class="bal-trans-left">
            <div class="bal-trans-icon" [ngClass]="tx.type">
              <span class="bal-icon" [ngClass]="tx.type">{{ tx.type === 'buy' ? '↓' : '↑' }}</span>
            </div>
            <div>
              <div class="bal-trans-tags">
                <span class="bal-tag" [ngClass]="tx.type">{{ tx.type.toUpperCase() }}</span>
                <span class="bal-pair">{{ tx.pair }}</span>
              </div>
              <div class="bal-amount">{{ tx.amount }}</div>
            </div>
          </div>
          <div class="bal-trans-right">
            <div class="bal-value">{{ tx.value }}</div>
            <div class="bal-time">{{ tx.time }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
