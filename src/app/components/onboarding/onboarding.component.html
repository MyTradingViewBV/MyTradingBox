<div class="onboarding-wrapper">
  <div class="onboarding-panel">
    <div class="onboarding-header">
      <h2 class="page-title">{{ 'ONBOARDING.WELCOME_TITLE' | translate }}</h2>
      <button class="skip-btn" (click)="skip()" [title]="'ONBOARDING.SKIP' | translate">×</button>
    </div>
    <div class="onboarding-body">
      @switch (step) {
        @case (0) {
          <app-info-step1></app-info-step1>
        }
        @case (1) {
          <app-info-step2></app-info-step2>
        }
        @case (2) {
          <app-info-step3></app-info-step3>
        }
        @case (3) {
          <app-info-step4></app-info-step4>
        }
        @case (4) {
          <app-info-step5></app-info-step5>
        }
        @case (5) {
          <app-info-step6></app-info-step6>
        }
        @case (6) {
          <app-info-step7></app-info-step7>
        }
      }
    </div>
    <div class="onboarding-footer">
      <div class="progress">
        {{ 'ONBOARDING.STEP_OF' | translate:{ current: step + 1, total: total } }}
      </div>
      <div class="buttons wl-header" style="position: static; background: none; border: none; padding: 0;">
        <button type="button" class="wl-btn" (click)="back()" [disabled]="step === 0">
          <span class="icon">↩</span><span>{{ 'ONBOARDING.BACK' | translate }}</span>
        </button>
        <button type="button" class="wl-btn" (click)="next()">
          <span class="icon">›</span><span>{{ step === total - 1 ? ('ONBOARDING.FINISH' | translate) : ('ONBOARDING.NEXT' | translate) }}</span>
        </button>
      </div>
    </div>
    <!-- Honeypot link: bots crawling links may hit this endpoint -->
    <a href="/honeypot" class="hp-link" rel="nofollow" aria-hidden="true">Help</a>
  </div>
</div>
