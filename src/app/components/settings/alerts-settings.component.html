<div class="alerts-settings-page glass">
  <div class="alerts-header glass gradient-gold">
    <a class="back-btn" routerLink="/settings">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f6ad55" stroke-width="2.2" stroke-linecap="round"><path d="M15 19l-7-7 7-7"/></svg>
    </a>
    <span class="alerts-title">Alerts Settings</span>
  </div>
  <div class="alerts-content">
    <div class="alerts-section">
      <div class="section-header">TRADE ORDERS</div>
      <div class="alerts-list">
        <label class="toggle-label" *ngFor="let alert of tradeOrderAlerts">
          <span>{{ alert.label }}</span>
          <span class="toggle-switch">
            <input type="checkbox" [(ngModel)]="alert.enabled" />
            <span class="slider"></span>
          </span>
        </label>
      </div>
    </div>
    <div class="alerts-section">
      <div class="section-header">BOX CANDLES</div>
      <div class="alerts-list">
        <label class="toggle-label" *ngFor="let alert of boxCandleAlerts">
          <span>{{ alert.label }}</span>
          <span class="toggle-switch">
            <input type="checkbox" [(ngModel)]="alert.enabled" />
            <span class="slider"></span>
          </span>
        </label>
      </div>
    </div>
    <div class="alerts-section">
      <div class="section-header">WATCHLIST</div>
      <div class="alerts-list">
        <label class="toggle-label" *ngFor="let alert of watchlistAlerts">
          <span>{{ alert.label }}</span>
          <span class="toggle-switch">
            <input type="checkbox" [(ngModel)]="alert.enabled" />
            <span class="slider"></span>
          </span>
        </label>
      </div>
    </div>
    <div class="alerts-section">
      <div class="section-header">CAPITAL FLOW TIERS</div>
      <div class="alerts-list">
        <label class="toggle-label" *ngFor="let alert of capitalFlowTiers">
          <span>{{ alert.label }}</span>
          <span class="toggle-switch">
            <input type="checkbox" [(ngModel)]="alert.enabled" />
            <span class="slider"></span>
          </span>
        </label>
      </div>
    </div>
    <div class="alerts-section">
      <div class="section-header">CAPITAL FLOW TIMEFRAMES</div>
      <div class="alerts-list">
        <label class="toggle-label" *ngFor="let alert of capitalFlowTimeframes">
          <span>{{ alert.label }}</span>
          <span class="toggle-switch">
            <input type="checkbox" [(ngModel)]="alert.enabled" />
            <span class="slider"></span>
          </span>
        </label>
      </div>
    </div>
  </div>
</div>
