<div class="watchlist-root">
  <!-- Top bar -->
  <div class="wl-header">
    <h2 class="wl-title">Watchlist</h2>
    <button type="button" class="wl-btn" (click)="back()" aria-label="Back">
      <span class="icon">↩</span>
    </button>
    <button type="button" class="wl-btn" (click)="refresh()" aria-label="Refresh">
      <span class="icon">⟳</span>
    </button>
  </div>

  <!-- Search -->
  <div class="wl-search">
    <input
      type="text"
      placeholder="Zoek symbol..."
      [(ngModel)]="searchQuery"
      (input)="onSearchInput()"
      (focus)="onSearchFocus()"
      (click)="onSearchFocus()"
      (blur)="onSearchBlur()"
    />
    <button type="button" class="wl-icon-btn" (click)="clearSearch()" *ngIf="searchQuery">✕</button>
  </div>

  <!-- Search Results: explicit actions only (no row click) -->
  <div *ngIf="(mergedSearchResults$ | async)?.length" class="wl-section">
    <div class="wl-section-header alt">
      <h3>Search Results</h3>
      <span class="badge">{{ (mergedSearchResults$ | async)?.length }}</span>
    </div>
    <div class="wl-card-list">
      <div class="wl-list">
        <div *ngFor="let vm of (mergedSearchResults$ | async)" class="wl-card" [class.is-user]="vm.isUserSymbol">
          <div class="gradient-hover"></div>
          <div class="shimmer-mask"></div>
          <div class="wl-card-inner">
            <div class="wl-left">
              <div class="pair-block">
                <div class="pair">{{ vm.name }}</div>
              </div>
            </div>
            <div class="wl-right">
              <div class="chips" style="display: flex; gap: 8px; align-items: center;">
                <button type="button" class="chip" (click)="goToChart(vm.name, '1d')">Open Chart</button>
                <button type="button" class="chip" (click)="onCoinInfoClick($event, vm.name)">Info</button>
                <button *ngIf="!vm.isUserSymbol" type="button" class="chip" (click)="addSymbolByVm(vm)">Add</button>
                <button *ngIf="vm.isUserSymbol" type="button" class="chip" (click)="deleteByVm(vm)">Delete</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


  <div class="wl-content component-wrapper" style="position: relative;">
    <div class="mtb-overlay" *ngIf="loading"><span class="mtb-spinner large"></span></div>
    <div *ngIf="loading" class="wl-loading" style="visibility: hidden;">Loading symbols…</div>
    <div *ngIf="!loading && errorMsg" class="wl-error">{{ errorMsg }}</div>

    <!-- Matrix View -->
    <div *ngIf="!loading" class="wl-section">
      <div class="wl-section-header alt">
        <h3>Matrix</h3>
      </div>
      <app-watchlist-matrix></app-watchlist-matrix>
    </div>

    <!-- User Symbols (Watchlist) -->
    <div *ngIf="!loading" class="wl-section">
      <div class="wl-section-header alt">
        <h3>My Symbols</h3>
        <span class="badge">{{ userSymbols.length }}</span>
      </div>
      <div class="wl-card-list">
        <div class="wl-list">
          <div *ngFor="let us of userSymbols; trackBy: trackByUserSymbol" class="wl-card">
            <div class="gradient-hover"></div>
            <div class="shimmer-mask"></div>
            <div class="wl-card-inner">
              <div class="wl-left">
                <div class="pair-block">
                  <div class="pair">{{ us.SymbolName || us.SymbolId }}</div>
                </div>
              </div>
              <div class="wl-right">
                <div class="chips" style="display: flex; gap: 8px; align-items: center;">
                  <button type="button" class="chip" (click)="goToChart(us.SymbolName || '', '1d')">Open Chart</button>
                  <button type="button" class="chip" (click)="deleteUserSymbol(us.Id)">Delete</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Coin Info Side Panel (non-navigating) -->
  <div *ngIf="infoOpen" class="coin-info-panel">
    <div class="coin-info-panel-header">
      <h4 class="coin-info-title">Info: {{ infoSymbol }}</h4>
      <button type="button" class="wl-icon-btn" (click)="closeInfo()">✕</button>
    </div>
    <app-coin-info [symbolInput]="infoSymbol" [embedded]="true"></app-coin-info>
  </div>
</div>
<app-footer></app-footer>
