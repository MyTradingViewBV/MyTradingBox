@if (hasBoxes) {
  <div class="progressbar-container" [title]="symbol + ' price levels'">
    <div class="progressbar-track">
      @for (segment of segments; track segment.label + $index) {
        @if (segment.type === 'box') {
          <div
            class="progressbar-box"
            [class.support]="segment.tone === 'support'"
            [class.resistance]="segment.tone === 'resistance'"
            [class.neutral]="segment.tone === 'neutral'"
            [style.flexGrow]="segment.width"
            [title]="segment.label"
          ></div>
        }
        @if (segment.type === 'gap') {
          <div class="progressbar-gap" [style.flexGrow]="segment.width" [title]="segment.label"></div>
        }
      }

      <div class="progressbar-marker" [style.left.%]="markerOffsetPercent" [title]="'Current: ' + (currentPrice | number:'1.2-6')"></div>
    </div>
  </div>
}

@if (!hasBoxes) {
  <div class="progressbar-empty">
    <span class="empty-price">No levels</span>
  </div>
}
