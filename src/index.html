<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>MyTradingBox</title>

  <!-- Base href - production uses /MyTradingBox/ for GitHub Pages -->
  <base href="/" />

  <!-- Fonts / Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Capacitor viewport configuration for iOS safe area -->

  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />

  <meta name="description" content="MyTradingBox - Professional trading application" />

  <!-- iOS PWA support -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TradingBox" />
  <meta name="format-detection" content="telephone=no" />

  <!-- iOS required icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180x180.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="assets/icons/icon-167x167.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152x152.png" />
