server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  # Basic rate limiting to slow automated scraping
  # 10 requests per second burst of 20 per IP
  limit_req_zone $binary_remote_addr zone=req_zone:10m rate=10r/s;

  location = /manifest.webmanifest {
    try_files $uri =404;
    add_header Content-Type application/manifest+json;
  }

  location / {
    try_files $uri $uri/ /index.html;
    # Apply rate limiting broadly to HTML routes
    limit_req zone=req_zone burst=20 nodelay;
    # Block some known bad user agents (lightweight measure)
    if ($http_user_agent ~* (masscan|scrapy|curl|wget|python-requests|httpclient|libwww|HTTrack|nikto)) {
      return 403;
    }
  }

  # Honeypot endpoint: return 410 and log distinctly
  log_format honeypot '$remote_addr - $remote_user [$time_local] "$request" '
                     'ua="$http_user_agent" ref="$http_referer" hp=1';
  access_log /var/log/nginx/access.log honeypot;
  location = /honeypot {
    return 410;
  }

  # Example API route protections (adjust paths to your API)
  location /api/ {
    try_files $uri =404;
    # Stricter rate limit for API
    limit_req zone=req_zone burst=10 nodelay;
    # Optional: cache-busting headers to reduce abuse
    add_header X-RateLimit-Policy "10 r/s, burst 10 per IP";
  }
}
